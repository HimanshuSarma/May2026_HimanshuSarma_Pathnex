plugin: amazon.aws.aws_ec2
regions:
  - us-east-1

# This creates groups like tag_Name_PublicInstance
keyed_groups:
  - key: tags.Name
    prefix: tag_Name
    separator: ""

compose:
  # This picks the public IP for the bastion and private for others
  ansible_host: public_ip_address | default(private_ip_address)

filters:
  instance-state-name: [running]